services:
    mariadb:
        build: ./requirements/mariadb
        container_name: mariaDB
        image: mariadb
        env_file: .env
        volumes: 
            - mariadb_data:/var/lib/mysql
        networks: 
            - inception
        secrets:
            - db_root_password
            - db_password
        restart: always
    wordpress:
        build: ./requirements/wordpress
        container_name: wordpress
        image: wordpress
        env_file: .env
        volumes:
            - wordpress_data:/var/www/html
        networks:
            - inception
        secrets:
            - db_password
        restart: always
    nginx:
        build: ./requirements/nginx
        container_name: nginx
        image: nginx
        volumes:
            - nginx_data:/var/www/html
        ports:
            - "443:443"
        networks:
            - inception
        restart: always
        

volumes:
    mariadb_data:
        driver: local
        driver_opts:
            type: none
            device: /home/pruszkie/data/mariadb
            o: bind
    wordpress_data:
        driver: local
        driver_opts:
            type: none
            device: /home/pruszkie/data/wordpress
            o: bind
    nginx_data:
        driver: local
        driver_opts:
            type: none
            device: /home/pruszkie/data/wordpress
            o: bind

networks:
    inception: 
        driver: bridge

secrets:
    db_root_password:
        file: ../secrets/db_root_password.txt
    db_password:
        file: ../secrets/db_password.txt
